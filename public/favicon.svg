<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#111115" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="node-root" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <linearGradient id="node-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>

    <linearGradient id="node-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>

    <!-- Connector Gradients -->
    <linearGradient id="edge-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>

    <linearGradient id="edge-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Rounded Rect) -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#27272a" stroke-width="12" />

  <!-- Connection Lines (Edges) -->
  <!-- Left Edge: (256, 140) to (140, 350) -->
  <line x1="256" y1="140" x2="140" y2="350" stroke="url(#edge-left)" stroke-width="16" stroke-linecap="round" filter="url(#glow)" />
  <!-- Right Edge: (256, 140) to (372, 350) -->
  <line x1="256" y1="140" x2="372" y2="350" stroke="url(#edge-right)" stroke-width="16" stroke-linecap="round" filter="url(#glow)" />

  <!-- Horizontal connection representing graph: (140, 350) to (372, 350) -->
  <path d="M 140 350 Q 256 400 372 350" fill="none" stroke="#4f46e5" stroke-width="8" stroke-dasharray="14 10" stroke-linecap="round" opacity="0.7" />

  <!-- Nodes (Circles) -->
  <!-- Root Node -->
  <circle cx="256" cy="140" r="54" fill="url(#node-root)" filter="url(#glow)" stroke="#0e7490" stroke-width="6" />
  <!-- Left Node -->
  <circle cx="140" cy="350" r="48" fill="url(#node-left)" filter="url(#glow)" stroke="#7e22ce" stroke-width="6" />
  <!-- Right Node -->
  <circle cx="372" cy="350" r="48" fill="url(#node-right)" filter="url(#glow)" stroke="#be185d" stroke-width="6" />

  <!-- Visualizer Bars / Core Data Structure representation in center -->
  <g transform="translate(216, 215)" filter="url(#glow)">
    <rect x="0" y="25" width="16" height="55" rx="6" fill="#22d3ee" />
    <rect x="28" y="0" width="16" height="80" rx="6" fill="#c084fc" />
    <rect x="56" y="15" width="16" height="65" rx="6" fill="#f472b6" />
  </g>
</svg>
